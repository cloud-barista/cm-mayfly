# Apache Airflow 3.3.0 설정.
#
# 이 파일은 "기본값과 다른 것만" 적는다. 나머지는 Airflow 3.3.0 기본값을 따른다.
# (이전 파일은 Airflow 2 기본값 269개를 통째로 덤프한 것이었고, 그 중 101개는
#  Airflow 3에서 삭제된 옵션이었다.)
#
# 전체 옵션 목록: airflow config list --defaults

[core]
# 컨테이너에 마운트되는 경로라 명시한다.
dags_folder = /usr/local/airflow/dags
plugins_folder = /usr/local/airflow/plugins

default_timezone = Asia/Seoul
executor = CeleryExecutor

# Airflow 3 기본값은 SimpleAuthManager 이므로 FAB 인증을 쓰려면 명시해야 한다.
# 경로도 Airflow 3에서 fab 프로바이더 쪽으로 옮겨졌다.
auth_manager = airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

# cm-cicada가 워크플로우를 만들면 바로 돌 수 있어야 한다 (기본값 True).
dags_are_paused_at_creation = False
load_examples = False

[database]
sql_alchemy_conn = mysql+mysqldb://airflow:airflow_pass@airflow-mysql/airflow

[api]
# Airflow 3에서 [webserver] 섹션이 없어지고 api-server 설정이 여기로 왔다.
host = 0.0.0.0
port = 8080
base_url = http://localhost:8080
secret_key = i1SEBjQvnCA93YEo+yjYEA==
expose_config = False

# Airflow 3 기본값은 50이다. cm-cicada가 DAG 목록을 받아 선형 탐색하므로
# 기존 동작(100)을 유지한다.
fallback_page_limit = 100

[api_auth]
# Task Execution API용 JWT 서명 키(jwt_secret)는 여기 두지 않는다.
# docker-compose.yaml이 AIRFLOW__API_AUTH__JWT_SECRET 환경변수로 주입하며,
# 값은 conf/docker/.env의 AIRFLOW_JWT_SECRET에서 온다(비어 있으면 mayfly가 생성).
#
# Airflow 공식 문서가 권고하는 방식이다 — "For security-sensitive deployments, pass
# this value via environment variable (AIRFLOW__API_AUTH__JWT_SECRET) rather than
# storing it in a configuration file". 이 파일은 공개 저장소에 커밋되므로 여기 적으면
# 서명 키가 공개된다.
#
# 값은 반드시 있어야 하고 서명·검증 프로세스 간 같아야 한다. 비워 두면 Airflow가
# 프로세스마다 다른 값을 생성해 모든 태스크가 "Invalid auth token"(403)으로 죽는다.

[fab]
# Airflow 3에서 [webserver]에 있던 FAB 관련 옵션들이 이 섹션으로 이동했다.
update_fab_perms = True
auth_rate_limited = True
auth_rate_limit = 5 per 40 second

[dag_processor]
# Airflow 3에서 [scheduler] -> [dag_processor] 로 이동했다.
min_file_process_interval = 5

[scheduler]
# Airflow 3 기본값은 False로 바뀌었다. 기존 동작을 유지하기 위해 명시한다.
catchup_by_default = True

[celery]
broker_url = redis://:airflow_pass@airflow-redis:6379/0
result_backend = db+mysql://airflow:airflow_pass@airflow-mysql/airflow
worker_autoscale = 8,4
