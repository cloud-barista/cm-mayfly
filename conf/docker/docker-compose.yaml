#version: "3.3"
# docker image : https://hub.docker.com/u/cloudbaristaorg

# Default health check configuration
x-default-health-check: &default-health-check
  interval: 30s      # run the health check every 30s
  timeout: 5s        # timeout for each health check command (5s)
  retries: 3         # mark unhealthy after 3 consecutive failures
  start_period: 10s  # ignore failures for the first 10s after the container starts

services:
# The priority used by Compose to choose which env var value to use:
# 1. Compose file
# 2. Shell environment variables
# 3. Environment file
# 4. Dockerfile
# 5. Variable is not defined

  # CB-Spider
  # https://github.com/cloud-barista/cb-spider/wiki/Docker-based-Start-Guide
  # https://hub.docker.com/r/cloudbaristaorg/cb-spider
  cb-spider:
    image: cloudbaristaorg/cb-spider:0.12.32
    pull_policy: always
    container_name: cb-spider
    restart: unless-stopped
    platform: linux/amd64
    networks:
      - spider_net
    ports:
      - target: 1024
        published: 1024
        protocol: tcp
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./conf/cb-spider/:/root/go/src/github.com/cloud-barista/cb-spider/conf/:ro
      - ./data/cb-spider/meta_db/:/root/go/src/github.com/cloud-barista/cb-spider/meta_db/
      - ./data/cb-spider/log/:/root/go/src/github.com/cloud-barista/cb-spider/log/
    environment:
      - PLUGIN_SW=OFF
      - SERVER_ADDRESS=0.0.0.0:1024
      # cb-spider 0.12.17+ enforces authentication — empty values cause log.Fatal on startup
      - SPIDER_USERNAME=${SPIDER_USERNAME}
      - SPIDER_PASSWORD=${SPIDER_PASSWORD}
      - SPIDER_LOG_LEVEL=${SPIDER_LOG_LEVEL}
      - SPIDER_HISCALL_LOG_LEVEL=${SPIDER_HISCALL_LOG_LEVEL}
      - ID_TRANSFORM_MODE=OFF
      - ADMINWEB=ON # ON or OFF Spider Admin Web Console
    healthcheck: # for CB-Spider
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://localhost:1024/spider/readyz" ]
      <<: *default-health-check

  # CB-Tumblebug
  # https://github.com/cloud-barista/cb-tumblebug/blob/main/scripts/runTumblebug.sh
  # https://hub.docker.com/r/cloudbaristaorg/cb-tumblebug
  # See https://github.com/cloud-barista/cb-tumblebug/blob/main/docker-compose.yaml
  cb-tumblebug:
    image: cloudbaristaorg/cb-tumblebug:0.12.22
    container_name: cb-tumblebug
    restart: unless-stopped
    pull_policy: always
    platform: linux/amd64
    networks:
      - spider_net
      - default
    ports:
      - target: 1323
        published: 1323
        protocol: tcp
    depends_on:
      cb-tumblebug-etcd:
        condition: service_started
      cb-spider:
        condition: service_started
      cb-tumblebug-postgres:
        condition: service_healthy
      mc-terrarium:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./conf/cb-tumblebug/conf:/app/conf/:ro
      - ./data/cb-tumblebug/meta_db/:/app/meta_db/
      - ./data/cb-tumblebug/log/:/app/log/
    environment:
      # - TB_ROOT_PATH=/app
      # # Enable TB_SELF_ENDPOINT to specify an endpoint for CB-TB API (default: localhost:1323)
      # # Use public IP if you want to access the API Dashboard from outside of localhost
      # - TB_SELF_ENDPOINT=xxx.xxx.xxx.xxx:1323
      - TB_SPIDER_REST_URL=http://cb-spider:1024/spider
      - TB_ETCD_ENDPOINTS=http://cb-tumblebug-etcd:2379
      - TB_TERRARIUM_REST_URL=http://mc-terrarium:8055/terrarium
      # - TB_IAM_MANAGER_REST_URL=http://mc-iam-manager:5000
      # - TB_ETCD_AUTH_ENABLED=false
      # - TB_ETCD_USERNAME=default
      # - TB_ETCD_PASSWORD=default
      - TB_POSTGRES_ENDPOINT=cb-tumblebug-postgres:5432
      - TB_POSTGRES_DATABASE=${TUMBLEBUG_DB_NAME}
      - TB_POSTGRES_USER=${TUMBLEBUG_DB_USER}
      - TB_POSTGRES_PASSWORD=${TUMBLEBUG_DB_PASSWORD}
      - TB_TERRARIUM_API_USERNAME=${TERRARIUM_API_USERNAME}
      - TB_TERRARIUM_API_PASSWORD=${TERRARIUM_API_PASSWORD}
      # - TB_ALLOW_ORIGINS=*
      # - TB_AUTH_ENABLED=true
      # - TB_AUTH_MODE=jwt
      - TB_API_USERNAME=${TB_API_USERNAME}
      - TB_API_PASSWORD=${TB_API_PASSWORD}
      # - TB_AUTOCONTROL_DURATION_MS=10000
      # - TB_DRAGONFLY_REST_URL=http://cb-dragonfly:9090/dragonfly
      # - TB_DEFAULT_NAMESPACE=default
      # - TB_DEFAULT_CREDENTIALHOLDER=admin
      # - TB_LOGFILE_PATH=/app/log/tumblebug.log
      # - TB_LOGFILE_MAXSIZE=1000
      # - TB_LOGFILE_MAXBACKUPS=3
      # - TB_LOGFILE_MAXAGE=30
      # - TB_LOGFILE_COMPRESS=false
      - TB_LOGLEVEL=${TB_LOGLEVEL}
      # - TB_LOGWRITER=both
      # - TB_NODE_ENV=development
      # OpenBao (secrets manager) integration
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://localhost:1323/tumblebug/readyz" ]
      <<: *default-health-check

  cb-tumblebug-etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: cb-tumblebug-etcd
    restart: unless-stopped
    networks:
      - default
    ports:
      - target: 2379
        published: 2379
        protocol: tcp
      - target: 2380
        published: 2380
        protocol: tcp
    volumes:
      - ./data/cb-tumblebug-etcd:/etcd-data
    entrypoint: /usr/local/bin/etcd
    command:
      - --name
      - s1
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - s1=http://0.0.0.0:2380
      - --initial-cluster-token
      - tkn
      - --initial-cluster-state
      - new
      - --log-level
      - info
      - --logger
      - zap
      - --log-outputs
      - stderr
      - --auth-token
      - simple
    healthcheck:
      #test: [ "CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      test: [ "CMD", "/usr/local/bin/etcd", "--version"]
      <<: *default-health-check


  # mc-infra-manager PostgreSQL
  # This is used for storing CB-Tumblebug Spec and Image.
  cb-tumblebug-postgres:
    image: postgres:16-alpine
    container_name: cb-tumblebug-postgres
    restart: always
    networks:
      - spider_net
      - default
    ports:
      - 6432:5432
    volumes:
      - ./data/cb-tumblebug-postgres:/var/lib/postgresql/data
    # Recommended for cb-tumblebug 0.12.9 — raise the concurrent connection limit
    command: postgres -c max_connections=500
    environment:
      - POSTGRES_USER=${TUMBLEBUG_DB_USER}
      - POSTGRES_PASSWORD=${TUMBLEBUG_DB_PASSWORD}
      - POSTGRES_DB=${TUMBLEBUG_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TUMBLEBUG_DB_USER}"]
      <<: *default-health-check


  # cb-mapui
  # used by cb-tumblebug
  # See https://github.com/cloud-barista/cb-tumblebug/blob/main/docker-compose.yaml
  cb-mapui:
    image: cloudbaristaorg/cb-mapui:0.12.47
    container_name: cb-mapui
    restart: unless-stopped
    pull_policy: always
    ports:
      - target: 1324
        published: 1324
        protocol: tcp
    # depends_on:
    #   - cb-tumblebug
    healthcheck: # for cb-mapui
      #test: ["CMD", "nc", "-vz", "127.0.0.1", "1324"]
      test: ["CMD", "nc", "-vz", "cb-mapui", "1324"]
      <<: *default-health-check


  # mc-terrarium
  # OpenTofu-based resource provisioning (AWS site-to-site VPN, etc.)
  # Added as a new dependency in cb-tumblebug 0.12.9+
  # See https://github.com/cloud-barista/mc-terrarium
  mc-terrarium:
    image: cloudbaristaorg/mc-terrarium:0.1.4
    container_name: mc-terrarium
    restart: unless-stopped
    pull_policy: always
    platform: linux/amd64
    networks:
      - spider_net
      - default
    ports:
      - target: 8055
        published: 8055
        protocol: tcp
    depends_on:
      openbao-unseal:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./data/mc-terrarium/.terrarium:/app/.terrarium
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      - TERRARIUM_ROOT=/app
      - TERRARIUM_API_USERNAME=${TERRARIUM_API_USERNAME}
      - TERRARIUM_API_PASSWORD=${TERRARIUM_API_PASSWORD}
      - TERRARIUM_LOGLEVEL=info
      # OpenBao secrets manager integration (CSP credential lookup)
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://localhost:8055/terrarium/readyz" ]
      <<: *default-health-check


  # openbao
  # OpenBao secrets manager (Vault fork) — stores CSP credentials
  # Used as the secrets backend for mc-terrarium in cb-tumblebug 0.12.9+
  # See https://openbao.org/
  openbao:
    image: openbao/openbao:2.5.1
    container_name: openbao
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    networks:
      - default
    ports:
      - target: 8200
        published: 8200
        protocol: tcp
    environment:
      - BAO_ADDR=http://0.0.0.0:8200
      - SKIP_SETCAP=true
    # Persistent mode (file-based storage) — secrets survive restarts
    entrypoint: ["sh", "-c"]
    command:
      - |
        chown -R openbao:openbao /openbao/data || { echo "ERROR: chown failed on /openbao/data"; exit 1; }
        exec docker-entrypoint.sh server -config=/openbao/config/openbao-config.hcl
    volumes:
      - ./data/openbao/data:/openbao/data
      - ./data/openbao/secrets:/openbao/secrets
      - ./conf/openbao/openbao-config.hcl:/openbao/config/openbao-config.hcl:ro
    healthcheck:
      # bao status exit codes: 0 = unsealed, 1 = sealed but running, 2 = uninitialized
      # all three mean the OpenBao process is running, so treat as healthy
      test: ["CMD", "sh", "-c", "rc=0; bao status || rc=$$?; [ $$rc -le 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s


  # openbao-unseal (sidecar)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # On restart OpenBao comes up in the sealed state, so this watcher sidecar
  # polls and re-unseals automatically so the user doesn't have to enter the
  # manual unseal command every time.
  #
  # ⚠ Security trade-off (must be reviewed for production environments)
  # ──────────────────────────────────────────────────────────────────────
  # This sidecar stores the unseal key in plaintext in a host file
  # (data/openbao/secrets/openbao-init.json) and unseals automatically. This defeats
  # the intent of OpenBao/Vault's Shamir secret sharing (distributing the key across
  # holders to prevent single-point exposure).
  # In other words, if the host is compromised, anyone can access all OpenBao secrets.
  #
  # Depending on your production security level, consider the following:
  #   1) Manual unseal — comment out this sidecar and run
  #      `mayfly setup openbao unseal` (or enter the key directly) on the host
  #      after every restart. Most secure, but increases availability and
  #      operational burden.
  #   2) Cloud KMS Auto-Unseal — use AWS KMS / GCP Cloud KMS / Azure
  #      Key Vault. Add a `seal "awskms"` stanza to conf/openbao/openbao-config.hcl
  #      → the unseal key is sealed with the KMS key, so no host file is needed.
  #      Recommended production approach.
  #   3) HSM — sealed with a hardware security module. Strongest, but higher cost and complexity.
  #
  # This sidecar is the default choice that prioritizes operational convenience in
  # workshop, dev, and internal PoC environments; for production-grade deployments
  # we recommend switching to (2) the KMS approach or (1) the manual approach.
  # For detailed procedures, see docs/upgrade-cb-tb-0.12.9.md.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  openbao-unseal:
    image: alpine:3.20
    container_name: openbao-unseal
    restart: unless-stopped     # auto-unseal watcher — keeps OpenBao unsealed
    networks:
      - default
    environment:
      # Poll cadence (seconds) for the auto-unseal watcher. Single source of
      # truth is conf/docker/.env (OPENBAO_UNSEAL_POLL_INTERVAL); 30 is the
      # default if unset.
      OPENBAO_UNSEAL_POLL_INTERVAL: ${OPENBAO_UNSEAL_POLL_INTERVAL:-30}
    depends_on:
      openbao:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly:ro
      - ./data/openbao/secrets:/secrets:ro
    healthcheck:
      # Healthy once OpenBao reports unsealed. Dependents wait on this instead
      # of waiting for a one-shot to complete, so the watcher can keep running
      # and re-unseal after a restart.
      test: ["CMD-SHELL", "/app/tool/mayfly rest get http://openbao:8200/v1/sys/seal-status -o /tmp/h.json >/dev/null 2>&1 && tr -d ' \n\t' < /tmp/h.json | grep -q '\"sealed\":false'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MAYFLY=/app/tool/mayfly
        INTERVAL=$${OPENBAO_UNSEAL_POLL_INTERVAL:-30}

        # Continuous auto-unseal watcher. OpenBao comes up SEALED on every
        # (re)start — including a host / EC2 stop-start. `mayfly setup openbao
        # unseal` reads the init file as JSON natively (no grep/python) and is a
        # no-op when OpenBao is already unsealed, so polling it keeps OpenBao
        # unsealed across the stack's lifetime. It prints only when it actually
        # unseals, so steady-state logs stay quiet.
        #
        # Polling cadence is OPENBAO_UNSEAL_POLL_INTERVAL (seconds) from .env.
        # For fully manual operation, comment this whole service out and run
        # `mayfly setup openbao unseal` by hand after a restart.
        echo "[openbao-unseal] auto-unseal watcher started (poll $${INTERVAL}s)"
        while true; do
          $$MAYFLY setup openbao unseal \
            --file /secrets/openbao-init.json \
            --addr http://openbao:8200 2>&1 | sed 's/^/[openbao-unseal] /'
          sleep "$${INTERVAL}"
        done


  # cm-beetle
  # https://github.com/cloud-barista/cm-beetle/discussions/105
  # https://hub.docker.com/r/cloudbaristaorg/cm-beetle
  # See https://github.com/cloud-barista/cm-beetle/blob/main/deployments/docker-compose/docker-compose.yaml
  # If you need to modify the config.yaml file, including modifying tumblebug's credentials, you'll need to copy the latest file and modify it before using it.
  # see conf folder : https://github.com/cloud-barista/cm-beetle/tree/main/conf
  # And remove the conf-related comments in the volumes settings below.
  cm-beetle:
    image: cloudbaristaorg/cm-beetle:0.5.4
    container_name: cm-beetle
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - target: 8056
        published: 8056
        protocol: tcp
    depends_on:
      cb-tumblebug:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      #- ./conf/cm-beetle/conf:/app/conf/
      - ./data/cm-beetle/log/:/app/log/
      - ./data/cm-beetle/db:/app/db/
    environment:
      # - BEETLE_ROOT=/app
      - BEETLE_SELF_ENDPOINT=localhost:8056
      # - BEETLE_API_ALLOW_ORIGINS=*
      # - BEETLE_API_AUTH_ENABLED=true
      - BEETLE_API_USERNAME=${BEETLE_API_USERNAME}
      - BEETLE_API_PASSWORD=${BEETLE_API_PASSWORD}
      # - BEETLE_LKVSTORE_PATH=/app/db/beetle.db
      # - BEETLE_LOGFILE_PATH=/app/log/beetle.log
      # - BEETLE_LOGFILE_MAXSIZE=1000
      # - BEETLE_LOGFILE_MAXBACKUPS=3
      # - BEETLE_LOGFILE_MAXAGE=30
      # - BEETLE_LOGFILE_COMPRESS=false
      - BEETLE_LOGLEVEL=${BEETLE_LOGLEVEL}
      # - BEETLE_LOGWRITER=both
      - BEETLE_NODE_ENV=development
      # - BEETLE_AUTOCONTROL_DURATION_MS=10000
      - BEETLE_TUMBLEBUG_ENDPOINT=http://cb-tumblebug:1323
      # - BEETLE_TUMBLEBUG_API_USERNAME=default
      # - BEETLE_TUMBLEBUG_API_PASSWORD=default
    healthcheck: # for CM-Beetle
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-beetle:8056/beetle/readyz" ]
      #test: [ "CMD", "curl", "-f", "http://localhost:8056/beetle/readyz" ]
      <<: *default-health-check


  # cm-butterfly (api)
  # If the configuration file location is different, uncomment the lines in the environment section as needed.
  # https://github.com/cloud-barista/cm-butterfly
  # https://github.com/cloud-barista/cm-butterfly/blob/main/scripts/docker-compose.yaml
  # https://github.com/cloud-barista/cm-butterfly/blob/main/api/.env.sample to .env <-- share to cm-butterfly-db
  # https://github.com/cloud-barista/cm-butterfly/tree/main/api/conf
  # (Not required) https://github.com/cloud-barista/cm-butterfly/tree/main/api/conf/api.yaml.sample to api.yaml
  # (Not required) https://github.com/cloud-barista/cm-butterfly/tree/main/api/conf/authsetting.yaml.sample to authsetting.yaml
  # https://hub.docker.com/r/cloudbaristaorg/cm-butterfly-api
  cm-butterfly-api:
    # image: cloudbaristaorg/cm-butterfly-api:edge
    image: cloudbaristaorg/cm-butterfly-api:0.5.1
    # image: csescsta/cm-butterfly-api:20260408145340-develop
    container_name: cm-butterfly-api
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    # networks:
    #   - cm-butterfly-network
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
    networks:
      - spider_net
      - default
    depends_on:
      cm-butterfly-db:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      #- ./conf/cm-butterfly/api/conf:/conf/
      - ./conf/cm-butterfly/api/conf/authsetting.yaml:/conf/authsetting.yaml
      #- ./conf/cm-butterfly/api/conf/api.yaml:/conf/api.yaml
      #- ./data/cm-butterfly/log/api.log:/app/api.log
    environment:
      # API listen address (fixed inside the cm-butterfly-api container; not secrets)
      - API_ADDR=0.0.0.0
      - API_PORT=4000
      # User auth / menu config paths (container-internal paths; not secrets)
      - USER_AUTH_DATA_PATH=conf/user.dat
      - USER_AUTH_CONF_PATH=conf/authsetting.yaml
      - MENU_CONF_DATA_PATH=conf/menu.yaml
      # PostgreSQL credentials (managed centrally in the host .env)
      - POSTGRES_USER=${BUTTERFLY_DB_USER}
      - POSTGRES_PASSWORD=${BUTTERFLY_DB_PASSWORD}
      - POSTGRES_DATABASE_HOST=cm-butterfly-db
      - POSTGRES_DB=${BUTTERFLY_DB_NAME}
      - DATABASE_URL=postgres://${BUTTERFLY_DB_USER}:${BUTTERFLY_DB_PASSWORD}@cm-butterfly-db:5432/${BUTTERFLY_DB_NAME}
    healthcheck: # for butterfly-api
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-butterfly-api:4000/readyz" ]
      #test: [ "CMD", "curl", "-f", "http://localhost:4000/readyz" ]
      <<: *default-health-check



  # cm-butterfly (front)
  # https://github.com/cloud-barista/cm-butterfly
  # https://github.com/cloud-barista/cm-butterfly/blob/main/scripts/docker-compose.yaml
  # https://github.com/cloud-barista/cm-butterfly/blob/main/front/nginx.conf
  # https://hub.docker.com/r/cloudbaristaorg/cm-butterfly-front
  cm-butterfly-front:
    # image: cloudbaristaorg/cm-butterfly-front:edge
    image: cloudbaristaorg/cm-butterfly-front:0.5.1
    # image: csescsta/cm-butterfly-front:edge
    # image: csescsta/cm-butterfly-front:20260408145340-develop

    container_name: cm-butterfly-front
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    # networks:
    #   - cm-butterfly-network
    ports:
      - target: 80
        published: 80
        protocol: tcp
    depends_on:
      cm-butterfly-api:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./conf/cm-butterfly/front/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
    healthcheck: # for butterfly-api
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-butterfly-front:80/" ]
      #test: [ "CMD", "curl", "-f", "http://localhost:4000/readyz" ]
      <<: *default-health-check



  # cm-butterfly-front-dev:
  #   # image: cloudbaristaorg/cm-butterfly-front:edge
  #   # image: cloudbaristaorg/cm-butterfly-front:0.5.0
  #   # image: csescsta/cm-butterfly-front:edge
  #   # image: csescsta/cm-butterfly-front:20260304041627-feature-260220-jsonviewer-jsyoo
  #   image: csescsta/cm-butterfly-front:20260318094849-feature-260318-jsonviewer-workflow-jsyoo
  #
  #   container_name: cm-butterfly-front-dev
  #   pull_policy: always
  #   platform: linux/amd64
  #   restart: unless-stopped
  #   # networks:
  #   #   - cm-butterfly-network
  #   ports:
  #     - target: 80
  #       published: 5174
  #       protocol: tcp
  #   depends_on:
  #     cm-butterfly-api:
  #       condition: service_healthy
  #   volumes:
  #     - ./tool/mayfly:/app/tool/mayfly
  #     - ./conf/cm-butterfly/front/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
  #   healthcheck: # for butterfly-api
  #     test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-butterfly-front-dev:80/" ]
  #     #test: [ "CMD", "curl", "-f", "http://localhost:4000/readyz" ]
  #     <<: *default-health-check


  # cm-butterfly (db)
  # https://github.com/cloud-barista/cm-butterfly
  # https://github.com/cloud-barista/cm-butterfly/blob/main/api/.env.sample to .env
  cm-butterfly-db:
    container_name: cm-butterfly-db
    image: postgres:14-alpine
    restart: unless-stopped
    # networks:
    #   - cm-butterfly-network
    ports:
      - target: 5432
        published: 543
        protocol: tcp
    environment:
      - POSTGRES_USER=${BUTTERFLY_DB_USER}
      - POSTGRES_PASSWORD=${BUTTERFLY_DB_PASSWORD}
      - POSTGRES_DB=${BUTTERFLY_DB_NAME}
    volumes:
      - ./data/cm-butterfly-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${BUTTERFLY_DB_USER}", "-d", "${BUTTERFLY_DB_NAME}" ]
      <<: *default-health-check


  # @TODO - **Linked systems such as Airflow are required**
  # cm-honeybee
  # https://github.com/cloud-barista/cm-honeybee/tree/main/server
  # https://hub.docker.com/r/cloudbaristaorg/cm-honeybee
  # See https://github.com/cloud-barista/cm-honeybee/blob/main/server/docker-compose.yaml
  cm-honeybee:
    image: cloudbaristaorg/cm-honeybee:edge
    # image: cloudbaristaorg/cm-honeybee:0.5.0
    container_name: cm-honeybee
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    ports:
      # 8081 : Server / 8082 : Agent
      - "8081:8081"
      #- "8082:8082"
    # depends_on:
    #   - cm-honeybee-agent
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./data/cm-honeybee/:/root/.cm-honeybee/:rw
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-honeybee:8081/honeybee/readyz" ]
      <<: *default-health-check

  # cm-damselfly
  # https://github.com/cloud-barista/cm-damselfly
  # https://hub.docker.com/r/cloudbaristaorg/cm-damselfly
  cm-damselfly:
    # image: cloudbaristaorg/cm-damselfly:edge
    image: cloudbaristaorg/cm-damselfly:0.5.2
    container_name: cm-damselfly
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    environment:
      # Basic Auth is enforced only when DAMSELFLY_API_AUTH_ENABLED=true (default false).
      # The same credentials are referenced by conf/api.yaml so cm-mayfly sends matching values.
      - DAMSELFLY_API_AUTH_ENABLED=${DAMSELFLY_API_AUTH_ENABLED}
      - DAMSELFLY_API_USERNAME=${DAMSELFLY_API_USERNAME}
      - DAMSELFLY_API_PASSWORD=${DAMSELFLY_API_PASSWORD}
    ports:
      - target: 8088
        published: 8088
        protocol: tcp
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./data/cm-damselfly/db:/app/db/
      - /etc/ssl/certs:/etc/ssl/certs:ro
      #- ./conf/cm-damselfly/conf:/app/conf/
    healthcheck: # for CM-Damselfly
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-damselfly:8088/damselfly/readyz" ]
      <<: *default-health-check


  # cm-cicada
  # https://github.com/cloud-barista/cm-cicada
  # https://hub.docker.com/r/cloudbaristaorg/cm-cicada
  # **important** : The cm-beetle, cm-grasshopper, and airflow-server containers must be in a readyz state and running beforehand
  cm-cicada:
    image: cloudbaristaorg/cm-cicada:edge
    # image: cloudbaristaorg/cm-cicada:0.5.0
    container_name: cm-cicada
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      cm-damselfly:
        condition: service_healthy
      cm-beetle:
        condition: service_healthy
      cm-grasshopper:
        condition: service_healthy
      airflow-server:
        condition: service_healthy
    volumes:
      #- ./conf/cm-cicada/conf:/root/.cm-cicada/conf:rw
      - ./tool/mayfly:/app/tool/mayfly
      - ./conf/depends_on_order/entrypoint_cm_cicada.sh:/tool/entrypoint.sh
      - ./conf/cm-cicada/conf:/conf:rw
      - ./conf/cm-cicada/example:/lib/airflow/example:ro
      - ./conf/cm-cicada/_airflow:/_airflow:rw
      - ./data/cm-cicada/cicada_root:/cicada_root:rw
    environment:
      - CMCICADA_ROOT=/cicada_root
      # cm-cicada calls cm-damselfly, cm-beetle and cb-tumblebug. Those credentials are
      # currently hardcoded as default/default in cm-cicada.yaml, so they only work while
      # the called services also use the defaults. We pass the shared .env values here so
      # that once cm-cicada reads its API credentials from the environment, non-default
      # credentials work without a compose change on our side.
      - DAMSELFLY_API_USERNAME=${DAMSELFLY_API_USERNAME}
      - DAMSELFLY_API_PASSWORD=${DAMSELFLY_API_PASSWORD}
      - BEETLE_API_USERNAME=${BEETLE_API_USERNAME}
      - BEETLE_API_PASSWORD=${BEETLE_API_PASSWORD}
      - TB_API_USERNAME=${TB_API_USERNAME}
      - TB_API_PASSWORD=${TB_API_PASSWORD}
    # To ensure the order of dependencies, we are explicitly using the entrypoint(./conf/depends_on_order/~.sh)
    entrypoint: ["/tool/entrypoint.sh"]
    command: ["/cm-cicada"]
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-cicada:8083/cicada/readyz" ]
      <<: *default-health-check


  # airflow-redis
  # used by cm-cicada
  # reference : https://github.com/cloud-barista/cm-cicada/blob/main/_airflow/docker-compose.yml
  airflow-redis:
    container_name: airflow-redis
    image: redis:7.2-alpine
    command: redis-server --requirepass airflow_pass --port 6379
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50

  # airflow-mysql
  # used by cm-cicada
  # reference : https://github.com/cloud-barista/cm-cicada/blob/main/_airflow/docker-compose.yml
  # ./conf/_airflow/create_airflow_db.sql : https://github.com/cloud-barista/cm-cicada/blob/main/_airflow/create_airflow_db.sql
  airflow-mysql:
    container_name: airflow-mysql
    image: mysql:8.0-debian
    cap_add:
      - SYS_NICE
    restart: unless-stopped
    ports:
      - "3306:3306"
    # Block external access and allow access only from within the container
    # expose:
    #   - "3306"        
    environment:
        - MYSQL_ROOT_PASSWORD=${AIRFLOW_DB_ROOT_PASSWORD}
        - MYSQL_USER=${AIRFLOW_DB_USER}
        - MYSQL_PASSWORD=${AIRFLOW_DB_PASSWORD}
        - MYSQL_DATABASE=${AIRFLOW_DB_NAME}
    volumes:
        - ./conf/cm-cicada/_airflow/create_airflow_db.sql:/docker-entrypoint-initdb.d/create_airflow_db.sql
        - ./data/airflow-mysql:/var/lib/mysql
    healthcheck:
      # Use the centrally-managed .env credentials instead of hardcoded ones,
      # so the healthcheck stays in sync with whatever .env supplies to MYSQL_USER/PASSWORD.
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u $${MYSQL_USER} -p$${MYSQL_PASSWORD}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s


  # airflow-server
  # used by cm-cicada
  # reference : https://github.com/cloud-barista/cm-cicada/blob/main/_airflow/docker-compose.yml
  airflow-server:
    # build:
    #     context: ./conf/cm-cicada/_airflow ## build Docker file location
    container_name: airflow-server
    # image: cloudbaristaorg/airflow-server:0.5.0
    image: cloudbaristaorg/airflow-server:edge
    restart: unless-stopped
    environment:
        # SMTP settings (managed centrally in the host .env)
        - AIRFLOW__SMTP__SMTP_HOST=${SMTP_HOST}
        - AIRFLOW__SMTP__SMTP_USER=${SMTP_USER}
        - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
        - AIRFLOW__SMTP__SMTP_PORT=${SMTP_PORT}
        - AIRFLOW__SMTP__SMTP_MAIL_FROM=${SMTP_MAIL_FROM}
        # MySQL credentials (managed centrally in the host .env)
        - MYSQL_USER=${AIRFLOW_DB_USER}
        - MYSQL_PASSWORD=${AIRFLOW_DB_PASSWORD}
        - MYSQL_HOST=airflow-mysql
        - MYSQL_DATABASE=${AIRFLOW_DB_NAME}
        # AIRFLOW__{CORE,DATABASE}__SQL_ALCHEMY_CONN explicitly override airflow.cfg, which
        # otherwise keeps its built-in default of mysql://airflow:airflow_pass@airflow-mysql/airflow
        # regardless of the MYSQL_* variables above. Without these airflow-server fails with
        # "Access denied for user 'airflow'" whenever .env values differ from the hardcoded defaults
        # — same shape as the cm-ant ANT_DATABASE_* gap above. Both CORE (deprecated alias still
        # consulted in 2.x) and DATABASE keys are set so the override holds across version bumps.
        - AIRFLOW__CORE__SQL_ALCHEMY_CONN=mysql+mysqldb://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-mysql/${AIRFLOW_DB_NAME}
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-mysql/${AIRFLOW_DB_NAME}
    ports:
        - "5555:5555"
        - "8080:8080"
    command: >
        /bin/bash -c "
            # Wait for MySQL(airflow-mysql) to be ready
            # sleep 10
            # move to check logic : entrypoint_airflow_depends_on.sh

            # Clean up pid
            rm -f airflow-webserver.pid

            # Set up metadata database
            airflow db upgrade

            # Create default user
            airflow users create --username airflow --password airflow_pass --email ish@innogrid.com --firstname SuHyeon --lastname Im --role Admin

            # Start airflow
            airflow scheduler &
            airflow celery worker &
            airflow celery flower &
            airflow webserver

            # Keep the server on no matter what
            sleep infinity
        "
    depends_on:
      airflow-mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    volumes:
        - ./tool/mayfly:/app/tool/mayfly
        - ./conf/depends_on_order/entrypoint_cm_cicada_airflow.sh:/tool/entrypoint.sh
        - ./conf/cm-cicada/_airflow/airflow-home:/usr/local/airflow
        - /var/run/docker.sock:/var/run/docker.sock
    # To ensure the order of dependencies, we are explicitly using the entrypoint(./conf/depends_on_order/~.sh)
    entrypoint: ["/tool/entrypoint.sh"]
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://airflow-server:8080/health" ]
      <<: *default-health-check

  # cm-grasshopper
  # https://github.com/cloud-barista/cm-grasshopper
  # https://hub.docker.com/r/cloudbaristaorg/cm-grasshopper
  # See https://github.com/cloud-barista/cm-grasshopper/blob/main/docker-compose.yaml
  cm-grasshopper:
    image: cloudbaristaorg/cm-grasshopper:edge
    # image: cloudbaristaorg/cm-grasshopper:0.5.0
    container_name: cm-grasshopper
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      cm-honeybee:
        condition: service_healthy
      cm-grasshopper-rustfs:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./conf/cm-grasshopper/conf:/conf
      - ./data/cm-grasshopper/software_temp:/software_temp:rw
      - ./data/cm-grasshopper/software_log:/software_log:rw
      - ./data/cm-grasshopper/k8s_job_log:/k8s_job_log:rw
      - ./data/cm-grasshopper/data_root/:/root/.cm-grasshopper:rw
      - ./data/cm-honeybee/:/root/.cm-grasshopper/honeybee:ro
    command: >
      /bin/sh -c "
        if [ ! -f /root/.ssh/known_hosts ]; then
          mkdir -p /root/.ssh
          touch /root/.ssh/known_hosts
        fi
        if [ ! -f /root/.cm-grasshopper/honeybee/honeybee.key ]; then
          echo 'honeybee.key not found, exiting...';
          exit 1;
        else
         cp /root/.cm-grasshopper/honeybee/honeybee.key /root/.cm-grasshopper/ && echo 'Finished copying the honeybee.key file.';
          /cm-grasshopper;
        fi
      "
    healthcheck:
      test: [ "CMD", "/app/tool/mayfly", "rest", "get", "http://cm-grasshopper:8084/grasshopper/readyz" ]
      <<: *default-health-check

  # cm-grasshopper-rustfs
  # S3-compatible object storage used by cm-grasshopper for k8s velero backup/restore
  # See https://github.com/cloud-barista/cm-grasshopper/blob/main/docker-compose.yaml
  cm-grasshopper-rustfs:
    image: rustfs/rustfs:latest
    container_name: cm-grasshopper-rustfs
    pull_policy: always
    restart: unless-stopped
    user: "0:0"
    ports:
      - "19000:9000"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=:9000
    volumes:
      - ./data/cm-grasshopper/rustfs_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1:9000/" ]
      <<: *default-health-check

  # cm-ant
  # https://github.com/cloud-barista/cm-ant
  # https://hub.docker.com/r/cloudbaristaorg/cm-ant
  cm-ant:
    container_name: cm-ant
    # image: cloudbaristaorg/cm-ant:edge
    image: cloudbaristaorg/cm-ant:0.5.3
    platform: linux/amd64
    pull_policy: always
    ports:
        - 8880:8880
    networks:
      - spider_net
      - default
    depends_on:
      cb-tumblebug:
        condition: service_healthy
      ant-postgres:
        condition: service_healthy
    volumes:
      - ./tool/mayfly:/app/tool/mayfly
      - ./data/cm-ant:/app/result
    environment:
      - ANT_SPIDER_HOST=http://cb-spider
      - ANT_SPIDER_PORT=1024
      # cb-spider 0.12.17+ enforces Basic Auth; cm-ant must send credentials.
      # Without these two lines cm-ant calls cb-spider with empty auth header,
      # resulting in HTTP 401 from cb-spider on every price/cost lookup
      # (observed during cm-beetle v0.5.3 lineup verification with cm-ant edge).
      - ANT_SPIDER_USERNAME=${SPIDER_USERNAME}
      - ANT_SPIDER_PASSWORD=${SPIDER_PASSWORD}
      - ANT_TUMBLEBUG_HOST=http://cb-tumblebug
      - ANT_TUMBLEBUG_PORT=1323
      # cm-ant should call cb-tumblebug with the same Basic Auth credentials
      # the rest of the stack uses (.env's TB_API_*). We map the
      # forward-compatible TUMBLEBUG_API_* alias defined in .env.example
      # — TB_API_* remains the source of truth and TUMBLEBUG_API_* tracks it.
      - ANT_TUMBLEBUG_USERNAME=${TUMBLEBUG_API_USERNAME}
      - ANT_TUMBLEBUG_PASSWORD=${TUMBLEBUG_API_PASSWORD}
      - ANT_DATABASE_HOST=ant-postgres
      # cm-ant Go application reads ANT_DATABASE_USER/PASSWORD/NAME (not ANT_DB_*),
      # so remap from the shared .env names here. Without these three lines cm-ant
      # falls back to its built-in defaults (cm-ant-user/cm-ant-secret/cm-ant-db)
      # and authentication against ant-postgres fails whenever .env values differ.
      - ANT_DATABASE_USER=${ANT_DB_USER}
      - ANT_DATABASE_PASSWORD=${ANT_DB_PASSWORD}
      - ANT_DATABASE_NAME=${ANT_DB_NAME}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://cm-ant:8880/ant/readyz" ]
      <<: *default-health-check
    restart: unless-stopped


  # ant-postgres
  # used by cm-ant
  ant-postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ant-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${ANT_DB_USER}
      - POSTGRES_PASSWORD=${ANT_DB_PASSWORD}
      - POSTGRES_DB=${ANT_DB_NAME}
    volumes:
      - ./data/ant-postgres:/var/lib/postgresql/data
    #networks:
      # - cm-ant-db-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${ANT_DB_USER}", "-d", "${ANT_DB_NAME}" ]
      <<: *default-health-check
    restart: unless-stopped


  # cm-mayfly:
  # #   image: cloudbaristaorg/cm-mayfly:v0.1.0
  #   image: dev4unet/cm-mayfly:v0.2.0
  #   container_name: cm-mayfly
  #   platform: linux/amd64
  #   stdin_open: true
  #   tty: true
  #   networks:
  #     - spider_net
  #     - default


networks:
  spider_net: #Network for cb-spider isolation
  cm-butterfly-network: #Network for web isolation
  #cm-ant-db-network: #Network for cm-ant database isolation
